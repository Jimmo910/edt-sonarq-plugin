javacCustomEncodings.. = src/[UTF-8]
# resources/ must stay a source root here (NOT bin.includes): DiagnosticCategories loads /bsl-diagnostic-categories.json from the bundle/jar root via getResourceAsStream, so this folder's contents must land at the jar root with no "resources/" prefix.
source.. = src/,\
           resources/
bin.includes = META-INF/,\
               .,\
               plugin.xml,\
               plugin.properties,\
               plugin_ru.properties,\
               icons/
